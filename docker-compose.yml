version: '3.8'

services:
  bot:
    build: .
    container_name: telegram_downloader_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      # Override LOCAL_API_URL to point to host if needed. 
      # host.docker.internal works on Docker Desktop (Mac/Win) and sometimes Linux with extra config.
      # For pure Linux usage, we add extra_hosts below.
      - LOCAL_API_URL=http://host.docker.internal:8081
    environment:
    volumes:
      - ./downloads:/app/downloads
      - ./temp:/app/temp
    extra_hosts:
      - "host.docker.internal:host-gateway"


